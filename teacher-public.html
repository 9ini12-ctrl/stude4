<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>متابعة المعلم/المعلمة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          boxShadow: {
            soft: "0 18px 50px rgba(15,23,42,.08)"
          },
          colors: {
            brand: {
              50: "#f0f9ff",
              100: "#e0f2fe",
              500: "#0ea5e9",
              600: "#0284c7",
              700: "#0369a1"
            }
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="border-b border-white/60 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-5xl items-center justify-between gap-4 px-4 py-4">
      <div>
        <div class="text-sm text-slate-500">واجهة متابعة بدون تسجيل دخول</div>
        <h1 class="text-xl font-extrabold">متابعة المعلم / المعلمة</h1>
      </div>
      <a href="/" class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-100">الرئيسية</a>
    </div>
  </header>

  <main class="mx-auto max-w-5xl space-y-6 px-4 py-6">
    <section class="glass-card rounded-[2rem] p-5 md:p-6">
      <form id="teacher-pin-form" class="grid gap-4 md:grid-cols-[1fr_auto] md:items-end">
        <div>
          <label class="mb-2 block text-sm font-semibold">أدخل رمز المتابعة (4 أرقام)</label>
          <input id="teacher-pin-input" type="text" inputmode="numeric" maxlength="4" placeholder="0000" class="soft-ring w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-center text-xl font-black tracking-[0.35em]" required />
        </div>
        <button class="rounded-2xl bg-brand-600 px-6 py-3 font-bold text-white hover:bg-brand-700">عرض بياناتي</button>
      </form>
      <p id="teacher-pin-message" class="mt-3 text-sm font-medium text-slate-500"></p>
    </section>

    <section id="teacher-public-result" class="space-y-6"></section>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
