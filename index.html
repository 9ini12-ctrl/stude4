<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منصة رخصة ممارس</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          boxShadow: {
            soft: "0 18px 50px rgba(15,23,42,.08)"
          },
          colors: {
            brand: {
              50: "#f0f9ff",
              100: "#e0f2fe",
              500: "#0ea5e9",
              600: "#0284c7",
              700: "#0369a1"
            }
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <div class="absolute inset-0 -z-10 overflow-hidden">
    <div class="absolute top-[-6rem] right-[-4rem] h-72 w-72 rounded-full bg-sky-100 blur-3xl opacity-70"></div>
    <div class="absolute bottom-[-8rem] left-[-3rem] h-80 w-80 rounded-full bg-cyan-100 blur-3xl opacity-60"></div>
  </div>

  <main class="mx-auto flex min-h-screen max-w-md items-center px-4 py-8">
    <section class="glass-card w-full rounded-[2rem] p-6 md:p-8 fade-in">
      <div class="mb-6 flex items-center justify-center gap-3">
        <div class="flex items-center justify-center rounded-[1.5rem] border border-slate-200 bg-white px-4 py-3 shadow-soft">
          <img src="/assets/logo1.png" alt="شعار المنصة" class="h-16 w-auto object-contain" loading="lazy" onerror="this.style.display='none'" />
        </div>
        <div class="flex items-center justify-center rounded-[1.5rem] border border-slate-200 bg-white px-4 py-3 shadow-soft">
          <img src="/assets/logo2.png" alt="شعار الجهة" class="h-16 w-auto object-contain" loading="lazy" onerror="this.style.display='none'" />
        </div>
      </div>

      <div class="mb-6 text-center">
        <h1 id="auth-title" class="text-3xl font-extrabold">جارٍ فحص النظام...</h1>
        <p id="auth-subtitle" class="mt-2 text-sm text-slate-500">يتم تجهيز نموذج الدخول الآن.</p>
      </div>

      <div id="login-state" class="space-y-4">
        <div id="status-box" class="rounded-3xl border border-slate-200 bg-white p-5">
          <div class="space-y-3">
            <div class="skeleton mx-auto h-6 w-40"></div>
            <div class="mx-auto skeleton h-4 w-52"></div>
            <div class="skeleton h-12 w-full"></div>
          </div>
        </div>

        <form id="bootstrap-form" class="hidden-el space-y-4">
          <div class="rounded-2xl border border-sky-100 bg-sky-50 px-4 py-3 text-sm text-sky-800">
            لا يوجد أي مستخدم بعد. أنشئ أول مدير للنظام.
          </div>
          <div>
            <label class="mb-2 block text-sm font-semibold">اسم المدير</label>
            <input name="name" class="soft-ring w-full rounded-2xl border border-slate-200 bg-white px-4 py-3" placeholder="مثال: مدير النظام" required />
          </div>
          <div>
            <label class="mb-2 block text-sm font-semibold">اسم المستخدم</label>
            <input name="username" class="soft-ring w-full rounded-2xl border border-slate-200 bg-white px-4 py-3" placeholder="admin" required />
          </div>
          <div>
            <label class="mb-2 block text-sm font-semibold">كلمة المرور</label>
            <input type="password" name="password" class="soft-ring w-full rounded-2xl border border-slate-200 bg-white px-4 py-3" placeholder="********" required />
          </div>
          <button class="w-full rounded-2xl bg-brand-600 px-4 py-3 font-bold text-white transition hover:bg-brand-700">إنشاء المدير الأول</button>
        </form>

        <form id="login-form" class="hidden-el space-y-4">
          <div>
            <label class="mb-2 block text-sm font-semibold">اسم المستخدم</label>
            <input name="username" class="soft-ring w-full rounded-2xl border border-slate-200 bg-white px-4 py-3" placeholder="اسم المستخدم" required />
          </div>
          <div>
            <label class="mb-2 block text-sm font-semibold">كلمة المرور</label>
            <input type="password" name="password" class="soft-ring w-full rounded-2xl border border-slate-200 bg-white px-4 py-3" placeholder="********" required />
          </div>
          <button class="w-full rounded-2xl bg-slate-900 px-4 py-3 font-bold text-white transition hover:bg-slate-700">تسجيل الدخول</button>
        </form>

        <div id="form-message" class="text-center text-sm font-medium text-slate-500"></div>
      </div>
    </section>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
